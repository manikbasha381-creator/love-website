<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welcome ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ffc2d1, #ff8fab);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    animation: fadeIn 1.5s ease;
}

h1 {
    font-size: 3rem;
    color: white;
}

h2 {
    color: white;
    margin-top: 10px;
}

button {
    padding: 15px 25px;
    margin: 10px;
    border-radius: 15px;
    border: none;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.gallery {
    background: white;
}

.poems {
    background: #ff4d6d;
    color: white;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<h1>WELCOME TRISHA 💖</h1>
<h2 id="typing"></h2>

<div>
    <button class="gallery" onclick="location.href='gallery.html'">📸 Polaroids</button>
    <button class="poems" onclick="location.href='poems.html'">💌 Poems</button>
</div>

<script>
// typing effect
const text = "You are the best thing that ever happened to me ❤️";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 50);
    }
}
type();

// hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.style.position = "fixed";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.top = "100vh";
    heart.style.fontSize = (Math.random() * 20 + 20) + "px";
    document.body.appendChild(heart);

    let pos = 100;
    const fall = setInterval(() => {
        pos -= 1;
        heart.style.top = pos + "vh";
        if (pos < -10) {
            clearInterval(fall);
            heart.remove();
        }
    }, 30);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
