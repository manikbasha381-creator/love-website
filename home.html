<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome ❤️</title>
<style>
body {
    margin: 0;
    height: 100vh;
    background: #ffccd5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial;
}

h1 {
    font-size: 3rem;
    color: #d6336c;
    animation: fadeIn 2s ease;
}

.buttons {
    margin-top: 30px;
}

button {
    padding: 15px 25px;
    margin: 10px;
    border-radius: 15px;
    border: none;
    font-size: 18px;
    cursor: pointer;
}

.gallery {
    background: white;
}

.poems {
    background: #ff4d6d;
    color: white;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<h1>WELCOME TRISHA 💖</h1>

<div class="buttons">
    <button class="gallery" onclick="location.href='gallery.html'">📸 Polaroids</button>
    <button class="poems" onclick="location.href='poems.html'">💌 Poems</button>
</div>

</body>
</html>
