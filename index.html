<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Are you mine? 💖</title>
<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Arial';
}

.container {
    text-align: center;
}

h1 {
    color: white;
    font-size: 2.5rem;
}

button {
    padding: 15px 25px;
    margin: 10px;
    border: none;
    border-radius: 20px;
    font-size: 18px;
    cursor: pointer;
}

#yes {
    background: #ff4d6d;
    color: white;
}

#no {
    background: white;
}
</style>
</head>

<body>

<div class="container">
    <h1>Are you Vinosharan's girlfriend? 💖</h1>
    <button id="yes" onclick="goNext()">Yes 💘</button>
    <button id="no">No 😢</button>
</div>

<script>
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * window.innerWidth - 100;
    const y = Math.random() * window.innerHeight - 50;
    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

function goNext() {
    window.location.href = "home.html";
}
</script>

</body>
</html>
